modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
issueTrackerURL="https://github.com/hiimluck3r/custom-disc-maestro/issues"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="hiimluck3r"
displayURL="https://github.com/hiimluck3r/custom-disc-maestro"
description='''
Custom Disc Maestro lets you craft your own playable music discs. Compose a melody in the Cutting
Lathe's note sequencer (or import a Note Block Studio .nbs file) and cut it to a master disc. Grow a
galvanic matrix from the master in a kupfernickel bath, then press the matrix onto blackstone to stamp
finished records — dyeing the vinyl, label and pattern however you like. Records wear out with play and
can be deliberately scratched at a smithing table, and finished discs slot into decorated sleeves.
All audio uses Minecraft's own note-block sounds — no external mods required.
'''

[[mixins]]
config="cdm.mixins.json"

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
