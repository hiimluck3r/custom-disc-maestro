name: Build

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      # gradle.properties pins org.gradle.java.home to a local machine path (the system default Java
      # there is a JRE). On CI, setup-java already provides a full JDK 21 via JAVA_HOME, so drop the
      # override and let Gradle use the runner's toolchain.
      - name: Use the runner's JDK for Gradle
        run: sed -i '/^org\.gradle\.java\.home=/d' gradle.properties

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build --no-daemon --stacktrace

      - name: Upload mod jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cdm-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error
